function slug(s){return s.toLowerCase().replace(/é/g,'e').replace(/\s+/g,'');}
function iurl(n){return`https://www.serebii.net/pokemonpokopia/items/${slug(n)}.png`;}
function itag(n,sz){return`<img src="${iurl(n)}" width="${sz}" height="${sz}" alt="${n}" onerror="this.style.opacity=0">`;}
const habCls=h=>({Bright:'h-Bright',Warm:'h-Warm',Humid:'h-Humid',Dark:'h-Dark',Dry:'h-Dry',Cool:'h-Cool'}[h]||'h-Bright');

let filtered=[],activeIdx=-1;
const si=document.getElementById('si'),dd=document.getElementById('dd'),cb=document.getElementById('cb'),out=document.getElementById('out');

function buildList(items){
  filtered=items;
  if(!items.length){dd.innerHTML='<div class="dd-empty">No Pokémon found</div>';dd.classList.add('open');return;}
  dd.innerHTML=items.map((p,i)=>`<div class="dd-item" onmousedown="pick(${i})"><span class="dd-num">${p[0]}</span><span class="dd-name">${p[1]}</span><span class="dd-hab ${habCls(p[2])}">${p[2]}</span></div>`).join('');
  dd.classList.add('open');activeIdx=-1;
}

si.addEventListener('focus',()=>{
  const q=si.value.trim().toLowerCase();
  buildList(q?PKM.filter(p=>p[1].toLowerCase().includes(q)||p[0].includes(q)):PKM);
});
si.addEventListener('input',()=>{
  const q=si.value.trim().toLowerCase();
  cb.style.display=q?'block':'none';
  buildList(q?PKM.filter(p=>p[1].toLowerCase().includes(q)||p[0].includes(q)):PKM);
});
si.addEventListener('keydown',e=>{
  if(!dd.classList.contains('open'))return;
  const items=dd.querySelectorAll('.dd-item');
  if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));if(activeIdx>=0)items[activeIdx].scrollIntoView({block:'nearest'});}
  else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx));if(activeIdx>=0)items[activeIdx].scrollIntoView({block:'nearest'});}
  else if(e.key==='Enter'&&activeIdx>=0)pick(activeIdx);
  else if(e.key==='Escape')dd.classList.remove('open');
});
document.addEventListener('click',e=>{if(!document.getElementById('sw').contains(e.target))dd.classList.remove('open');});

function pick(i){
  const p=filtered[i];if(!p)return;
  si.value=`${p[0]} ${p[1]}`;cb.style.display='block';dd.classList.remove('open');activeIdx=-1;
  render(p);
}
function clearSearch(){
  si.value='';cb.style.display='none';dd.classList.remove('open');activeIdx=-1;
  out.innerHTML='<div class="empty">Search for a Pokémon above to explore their favorites and flavor foods</div>';
  si.focus();
}

function toggleGroup(id){
  const body=document.getElementById('gb-'+id);
  const chev=document.getElementById('gc-'+id);
  const open=body.classList.toggle('open');
  chev.classList.toggle('open',open);
}

function render(p){
  const[num,pname,hab,favs,flavor]=p;
  if(!favs||!favs.length){
    out.innerHTML=`<div class="hero"><span class="pnum">${num}</span><span class="pname">${pname}</span><span class="hab ${habCls(hab)}">${hab}</span></div><div class="empty">No favorites data available</div>`;return;
  }

  // Build grouped item sections — one per favorite category
  let totalItems=0;
  const groups=favs.map((fav,gi)=>{
    const items=ITEMS[fav]||[];
    totalItems+=items.length;
    const cards=items.map(n=>`<div class="icard"><div class="iimg">${itag(n,28)}</div><div class="iname">${n}</div></div>`).join('');
    return `<div class="group">
      <div class="group-header" onclick="toggleGroup(${gi})">
        <span class="group-title">${fav}</span>
        <span class="group-count">${items.length} items</span>
        <span class="group-chevron open" id="gc-${gi}">▼</span>
      </div>
      <div class="group-body open" id="gb-${gi}">
        <div class="igrid">${cards||'<span style="color:var(--text3);font-size:12px">No items listed</span>'}</div>
      </div>
    </div>`;
  }).join('');

  const ff=(FLAVOR_FOODS[flavor]||[]).map(f=>`<div class="ficard"><div class="fiimg">${itag(f.n,32)}</div><div class="fitext"><div class="finame">${f.n}</div><div class="fidesc">${f.d}</div></div></div>`).join('');

  out.innerHTML=`
    <div class="hero"><span class="pnum">${num}</span><span class="pname">${pname}</span><span class="hab ${habCls(hab)}">${hab}</span></div>
    <div class="divider" style="margin-top:0"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="slabel" style="margin:0">Matching items</div>
      <div class="total-count" style="margin:0">${totalItems} items across ${favs.length} categories</div>
    </div>
    ${groups}
    <div class="divider" style="margin-top:16px"></div>
    <div class="flavor-header"><div class="slabel" style="margin:0">Flavor foods</div><span class="flavor-pill">${flavor||'None'}</span></div>
    <div class="flavor-grid">${ff||'<div style="color:var(--text3);font-size:13px">No flavor foods</div>'}</div>`;
}

  if(name==='custom')cgInit();

function spriteUrl(num){const s=SPRITE[num];return s?`https://www.serebii.net/pokemonpokopia/pokemon/small/${s}.png`:'';}
function buildSharingGroups(){
  const map=new Map();
  PKM.forEach(p=>{
    const key=p[2]+'||'+[...p[3]].sort().join('|');
    if(!map.has(key))map.set(key,{hab:p[2],favs:[...p[3]],members:[]});
    map.get(key).members.push(p);
  });
  return[...map.values()].filter(g=>g.members.length>1).sort((a,b)=>b.members.length-a.members.length);
}
const ALL_GROUPS=buildSharingGroups();
const sgOpen={};
function toggleSg(id){
  sgOpen[id]=!sgOpen[id];
  document.getElementById('sgb-'+id).classList.toggle('open',sgOpen[id]);
  document.getElementById('sgc-'+id).classList.toggle('open',sgOpen[id]);
}
function renderSharing(){
  const q=(document.getElementById('sg-search').value||'').trim().toLowerCase();
  let groups=ALL_GROUPS;
  if(q){
    groups=groups.map(g=>{
      const members=g.members.filter(p=>p[1].toLowerCase().includes(q)||g.favs.some(f=>f.toLowerCase().includes(q)));
      return members.length?{...g,members}:null;
    }).filter(Boolean);
  }
  const sgOut=document.getElementById('sg-out'),sgSum=document.getElementById('sg-summary');
  if(!groups.length){sgOut.innerHTML='<div class="empty">No matching groups found</div>';sgSum.textContent='';return;}
  sgSum.textContent=`${groups.length} group${groups.length!==1?'s':''} sharing the same habitat & favorites`;
  sgOut.innerHTML=groups.map((g,gi)=>{
    if(sgOpen[gi]===undefined)sgOpen[gi]=true;
    const isOpen=sgOpen[gi];
    const favTags=g.favs.map(f=>`<span class="sg-fav-tag">${f}</span>`).join('');
    const cards=g.members.map(p=>`<div class="sg-pcard"><div class="sg-pimg"><img src="${spriteUrl(p[0])}" width="36" height="36" alt="${p[1]}" onerror="this.style.opacity=0"></div><div class="sg-pinfo"><div class="sg-pname">${p[1]}</div><div class="sg-pnum">${p[0]}</div><div class="sg-pflavor">${p[4]}</div></div></div>`).join('');
    return`<div class="sg-group"><div class="sg-header" onclick="toggleSg(${gi})"><span class="sg-title">${g.members.map(m=>m[1]).join(', ')}</span><div class="sg-meta"><span class="sg-hab ${habCls(g.hab)}">${g.hab}</span><span class="sg-count">${g.members.length} Pokémon</span><span class="sg-chevron ${isOpen?'open':''}" id="sgc-${gi}">▼</span></div></div><div class="sg-body ${isOpen?'open':''}" id="sgb-${gi}"><div class="sg-favs">${favTags}</div><div class="sg-pkm-grid">${cards}</div></div></div>`;
  }).join('');
}
// ── CUSTOM GROUP TAB ──────────────────────────────────────────────────────────
const CG_MAX = 4;
let cgSlots = [null, null, null, null]; // each: PKM entry or null
let cgOpenPer = {};

function cgInit() {
  const container = document.getElementById('cg-slots');
  container.innerHTML = '';
  for (let i = 0; i < CG_MAX; i++) {
    const slot = document.createElement('div');
    slot.className = 'cg-slot' + (cgSlots[i] ? ' filled' : '');
    slot.id = 'cg-slot-' + i;
    slot.innerHTML = cgSlotHTML(i);
    container.appendChild(slot);
  }
  cgRenderResult();
}

function cgSlotHTML(i) {
  const p = cgSlots[i];
  if (p) {
    return `
      <div class="cg-slot-label">Slot ${i+1}</div>
      <button class="cg-slot-remove" onclick="cgRemove(${i})">✕</button>
      <div class="cg-slot-chosen">
        <div class="cg-slot-pimg"><img src="${spriteUrl(p[0])}" width="32" height="32" alt="${p[1]}" onerror="this.style.opacity=0"></div>
        <div class="cg-slot-pinfo">
          <div class="cg-slot-pname">${p[1]}</div>
          <div class="cg-slot-pnum">${p[0]}</div>
          <span class="cg-slot-phab ${habCls(p[2])}">${p[2]}</span>
        </div>
      </div>`;
  }
  return `
    <div class="cg-slot-label">Slot ${i+1}</div>
    <div class="cg-empty-slot">
      <div>
        <input class="cg-slot-search" id="cg-si-${i}" placeholder="Search Pokémon…" autocomplete="off"
          oninput="cgSearch(${i},this.value)" onfocus="cgSearch(${i},this.value)"/>
        <div class="cg-slot-dd" id="cg-dd-${i}"></div>
      </div>
    </div>`;
}

function cgSearch(i, q) {
  const dd = document.getElementById('cg-dd-' + i);
  const chosen = cgSlots.filter(s=>s).map(s=>s[0]);
  const matches = PKM.filter(p => !chosen.includes(p[0]) &&
    (p[1].toLowerCase().includes(q.toLowerCase()) || p[0].includes(q))).slice(0, 12);
  if (!matches.length) { dd.innerHTML = '<div style="padding:10px 12px;font-size:12px;color:var(--text3)">No results</div>'; dd.classList.add('open'); return; }
  dd.innerHTML = matches.map((p,mi) =>
    `<div class="cg-slot-dd-item" onmousedown="cgPick(${i},'${p[0]}')">
      <img src="${spriteUrl(p[0])}" width="24" height="24" onerror="this.style.opacity=0">
      <span style="color:var(--text3);font-size:10px;min-width:36px">${p[0]}</span>
      <span style="flex:1">${p[1]}</span>
      <span class="dd-hab ${habCls(p[2])}" style="font-size:10px">${p[2]}</span>
    </div>`).join('');
  dd.classList.add('open');
}

function cgPick(i, num) {
  const p = PKM.find(x => x[0] === num);
  if (!p) return;
  cgSlots[i] = p;
  document.getElementById('cg-slot-' + i).className = 'cg-slot filled';
  document.getElementById('cg-slot-' + i).innerHTML = cgSlotHTML(i);
  document.addEventListener('click', function closer(e) {
    document.removeEventListener('click', closer);
  });
  cgRenderResult();
}

function cgRemove(i) {
  cgSlots[i] = null;
  document.getElementById('cg-slot-' + i).className = 'cg-slot';
  document.getElementById('cg-slot-' + i).innerHTML = cgSlotHTML(i);
  cgRenderResult();
}

document.addEventListener('click', e => {
  for (let i = 0; i < CG_MAX; i++) {
    const dd = document.getElementById('cg-dd-' + i);
    const si = document.getElementById('cg-si-' + i);
    if (dd && si && !si.contains(e.target) && !dd.contains(e.target)) dd.classList.remove('open');
  }
});

function cgRenderResult() {
  const active = cgSlots.filter(Boolean);
  const out = document.getElementById('cg-out');
  if (active.length < 2) { out.innerHTML = ''; return; }

  // Habitat check
  const habs = [...new Set(active.map(p => p[2]))];
  const habHTML = habs.length === 1
    ? `<div class="cg-hab-ok">✓ All ${active.length} Pokémon share the <strong>${habs[0]}</strong> habitat — they can live together comfortably.</div>`
    : `<div class="cg-hab-warn">⚠ Mixed habitats: ${habs.join(', ')} — these Pokémon prefer different environments. Consider this when grouping them.</div>`;

  // Build item → set of pkm names, and item → set of fav categories that contain it
  const itemCoverage = {}; // item → Set of pkm names
  const itemFavs = {};     // item → Set of fav category names
  active.forEach(p => {
    p[3].forEach(fav => {
      (ITEMS[fav] || []).forEach(item => {
        if (!itemCoverage[item]) { itemCoverage[item] = new Set(); itemFavs[item] = new Set(); }
        itemCoverage[item].add(p[1]);
        itemFavs[item].add(fav);
      });
    });
  });

  // Shared items: appear in 2+ pokemon's favorites
  const sharedItemMap = Object.fromEntries(
    Object.entries(itemCoverage).filter(([,names]) => names.size >= 2)
  );
  const sharedSet = new Set(Object.keys(sharedItemMap));

  // Collect ALL fav categories across all selected pokemon (deduplicated, in original order)
  const allFavs = [];
  const seenFavs = new Set();
  active.forEach(p => p[3].forEach(fav => { if (!seenFavs.has(fav)) { seenFavs.add(fav); allFavs.push(fav); } }));

  // For shared section: group shared items by which fav categories they belong to
  // A shared item may appear in multiple fav categories — put it under all applicable ones
  let sharedHTML = '';
  if (sharedSet.size > 0) {
    // Build per-fav-category groups of shared items
    const sharedByFav = {};
    allFavs.forEach(fav => {
      const items = (ITEMS[fav] || []).filter(item => sharedSet.has(item));
      if (items.length) sharedByFav[fav] = items;
    });

    let totalShared = sharedSet.size;
    const cgSharedOpen = {};

    const favGroupsHTML = Object.entries(sharedByFav).map(([fav, items], gi) => {
      const gid = 'cgsh-' + gi;
      // Which pokemon benefit from this fav category
      const benefiting = active.filter(p => p[3].includes(fav)).map(p => p[1]);
      const cards = items.map(item => {
        const nameArr = [...itemCoverage[item]];
        const coverageCount = nameArr.length;
        const badgeLabel = coverageCount === active.length ? 'All ' + active.length : coverageCount + '/' + active.length;
        return `<div class="cg-shared-icard">
          <span class="cg-shared-badge">${badgeLabel} Pokémon</span>
          <div class="cg-shared-iimg">${itag(item, 26)}</div>
          <div style="flex:1;min-width:0">
            <div class="cg-shared-iname">${item}</div>
            <div class="cg-shared-who">${nameArr.join(', ')}</div>
          </div>
        </div>`;
      }).join('');
      return `<div class="group" style="margin-bottom:8px">
        <div class="group-header" onclick="cgToggleSharedGroup('${gid}')">
          <span class="group-title" style="color:var(--text)">${fav}</span>
          <span class="group-count" style="color:var(--accent);font-weight:600">${items.length} shared item${items.length!==1?'s':''}</span>
          <span class="group-chevron open" id="${gid}-chev">▼</span>
        </div>
        <div class="group-body open" id="${gid}-body">
          <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Satisfies: ${benefiting.join(', ')}</div>
          <div class="cg-shared-items">${cards}</div>
        </div>
      </div>`;
    }).join('');

    sharedHTML = `<div class="cg-shared-banner">
      <div style="padding:12px 14px 10px">
        <div class="cg-section-title" style="color:var(--accent);margin-bottom:4px">★ Items covering multiple Pokémon (${totalShared})</div>
        <div style="font-size:12px;color:var(--text3)">Each category below has items that satisfy more than one Pokémon — place one item from each category to cover multiple Pokémon at once.</div>
      </div>
      <div style="padding:0 10px 10px">${favGroupsHTML}</div>
    </div>`;
  } else {
    sharedHTML = `<div class="cg-shared-banner"><div style="padding:12px 14px"><div class="cg-section-title" style="color:var(--accent);margin-bottom:4px">Items covering multiple Pokémon</div><div style="font-size:12px;color:var(--text3)">No single item covers more than one Pokémon in this group.</div></div></div>`;
  }

  // Per-pokemon breakdown
  const perHTML = active.map((p, pi) => {
    const isOpen = cgOpenPer[pi] !== false;
    if (cgOpenPer[pi] === undefined) cgOpenPer[pi] = true;
    const favGroups = p[3].map(fav => {
      const items = ITEMS[fav] || [];
      const itemCards = items.map(item => {
        const isShared = sharedSet.has(item);
        return `<div class="cg-per-icard${isShared?' shared':''}">
          <div class="cg-per-iimg">${itag(item, 18)}</div>
          <span class="cg-per-iname">${item}</span>
        </div>`;
      }).join('') || '<span style="font-size:11px;color:var(--text3)">No items listed</span>';
      return `<div class="cg-per-fav-group">
        <div class="cg-per-fav-label">${fav}</div>
        <div class="cg-per-items">${itemCards}</div>
      </div>`;
    }).join('');
    const totalItems = p[3].reduce((a,f) => a + (ITEMS[f]||[]).length, 0);
    return `<div class="cg-per-pkm">
      <div class="cg-per-header" onclick="cgTogglePer(${pi})">
        <div class="cg-per-pimg"><img src="${spriteUrl(p[0])}" width="28" height="28" alt="${p[1]}" onerror="this.style.opacity=0"></div>
        <span class="cg-per-pname">${p[1]}</span>
        <span class="cg-per-count">${totalItems} items</span>
        <span class="cg-per-chev ${isOpen?'open':''}" id="cgpc-${pi}">▼</span>
      </div>
      <div class="cg-per-body ${isOpen?'open':''}" id="cgpb-${pi}">${favGroups}</div>
    </div>`;
  }).join('');

  // ── BEST ITEMS SCORING ───────────────────────────────────────────────────────
  // Score = (unique fav categories covered) × (unique Pokémon covered)
  // Only consider items that cover 2+ categories OR 2+ Pokémon
  const totalFavs = allFavs.length;
  const totalPkm = active.length;

  const scoredItems = Object.entries(itemFavs)
    .map(([item, favSet]) => {
      const pkmSet = itemCoverage[item];
      const favCount = favSet.size;
      const pkmCount = pkmSet.size;
      const score = favCount * pkmCount;
      return { item, favCount, pkmCount, favSet, pkmSet, score };
    })
    .filter(d => d.score >= 2) // at least meaningful coverage
    .sort((a, b) => b.score - a.score || b.favCount - a.favCount || b.pkmCount - a.pkmCount || a.item.localeCompare(b.item));

  // Top items: score must be >= half the max score, cap at 12
  const topN = Math.min(12, scoredItems.length);
  const minScore = scoredItems.length ? Math.max(2, scoredItems[0].score * 0.4) : 2;
  const bestItems = scoredItems.filter(d => d.score >= minScore).slice(0, topN);

  let bestHTML = '';
  if (bestItems.length) {
    const cards = bestItems.map((d, ri) => {
      const pkmTags = [...d.pkmSet].map(n => `<span class="cg-best-tag pkm">${n}</span>`).join('');
      const favTags = [...d.favSet].map(f => `<span class="cg-best-tag fav">${f}</span>`).join('');
      const rankLabel = ri === 0 ? '★ Best pick' : ri < 3 ? `#${ri+1} pick` : `#${ri+1}`;
      return `<div class="cg-best-card">
        <span class="cg-best-rank">${rankLabel}</span>
        <div class="cg-best-iimg">${itag(d.item, 32)}</div>
        <div class="cg-best-info">
          <div class="cg-best-iname">${d.item}</div>
          <div class="cg-best-tags">${pkmTags}${favTags}</div>
        </div>
      </div>`;
    }).join('');
    bestHTML = `<div class="cg-best-panel">
      <div class="cg-best-header">
        <div class="cg-best-title">⚡ Best items to place</div>
        <div class="cg-best-desc">These items score highest for your group — each one covers the most Pokémon across the most favorite categories simultaneously.</div>
      </div>
      <div class="cg-best-grid">${cards}</div>
    </div>`;
  }

  out.innerHTML = habHTML + bestHTML + sharedHTML +
    `<div class="cg-section-title" style="margin-top:20px;margin-bottom:12px">Per-Pokémon item breakdown <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">(★ highlighted items are shared with another Pokémon in your group)</span></div>` +
    perHTML;
}

function cgToggleSharedGroup(gid) {
  const body = document.getElementById(gid + '-body');
  const chev = document.getElementById(gid + '-chev');
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function cgTogglePer(pi) {
  cgOpenPer[pi] = !cgOpenPer[pi];
  document.getElementById('cgpb-' + pi).classList.toggle('open', cgOpenPer[pi]);
  document.getElementById('cgpc-' + pi).classList.toggle('open', cgOpenPer[pi]);
}



</script>
